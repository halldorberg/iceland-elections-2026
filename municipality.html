<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sveitarfélag – Kosningar 2026</title>
  <meta name="description" content="Flokkar og frambjóðendur í sveitarstjórnarkosningum 2026." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- App styles -->
  <link rel="stylesheet" href="css/variables.css?v=2" />
  <link rel="stylesheet" href="css/municipality.css?v=8" />
</head>
<body class="page-municipality">

  <!-- Top nav -->
  <nav class="muni-nav">
    <a href="index.html" class="back-btn" id="back-btn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Til baka á kort
    </a>
    <div class="muni-header-info">
      <div class="muni-name-row">
        <div class="muni-name" id="muni-name">–</div>
        <button class="share-btn share-btn--muni" id="muni-share" aria-label="Deila hlekk á þetta sveitarfélag">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <circle cx="11" cy="2.5" r="1.75" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="3" cy="7" r="1.75" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="11" cy="11.5" r="1.75" stroke="currentColor" stroke-width="1.4"/>
            <line x1="4.6" y1="6.1" x2="9.4" y2="3.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="4.6" y1="7.9" x2="9.4" y2="10.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Deila
        </button>
      </div>
      <div class="muni-region" id="muni-region">–</div>
    </div>
    <div class="muni-pop" id="muni-pop"></div>
  </nav>

  <!-- Random party tooltip (fades in then out) -->
  <div class="random-tooltip" id="random-tooltip">
    <span class="dice-icon">🎲</span>
    <span id="random-tooltip-text">Opnaði af handahófi</span>
  </div>

  <!-- Election type notice (sjálfkjörið / óbundnar kosningar) -->
  <div id="election-type-notice"></div>

  <!-- Accordion -->
  <section class="accordion-section">
    <div class="accordion-container" id="accordion-container">
      <!-- Ribbons injected by JS -->
    </div>
  </section>

  <!-- Share toast -->
  <div class="share-toast" id="share-toast" aria-live="polite"></div>

  <!-- Candidate Modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-card" id="modal-card">
      <button class="modal-close" id="modal-close" aria-label="Loka">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="share-btn share-btn--modal" id="modal-share" aria-label="Deila hlekk á þennan frambjóðanda">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="11" cy="2.5" r="1.75" stroke="currentColor" stroke-width="1.4"/>
          <circle cx="3" cy="7" r="1.75" stroke="currentColor" stroke-width="1.4"/>
          <circle cx="11" cy="11.5" r="1.75" stroke="currentColor" stroke-width="1.4"/>
          <line x1="4.6" y1="6.1" x2="9.4" y2="3.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="4.6" y1="7.9" x2="9.4" y2="10.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Deila
      </button>
      <div class="modal-hero">
        <img class="modal-hero-photo" id="modal-photo" src="" alt="" />
        <div class="modal-hero-gradient"></div>
        <div class="modal-hero-info">
          <div class="modal-ballot-badge" id="modal-badge"></div>
          <div class="modal-candidate-name" id="modal-name"></div>
          <div class="modal-candidate-meta" id="modal-meta"></div>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-section" id="modal-bio-section">
          <div class="modal-section-label">Um frambjóðandann</div>
          <p class="modal-bio" id="modal-bio"></p>
        </div>
        <div class="modal-section" id="modal-interests-section">
          <div class="modal-section-label">Áhugamál</div>
          <div class="modal-interests" id="modal-interests"></div>
        </div>
        <div class="modal-section" id="modal-social-section">
          <div class="modal-section-label">Samfélagsmiðlar</div>
          <div class="modal-social" id="modal-social"></div>
        </div>
        <div class="modal-section" id="modal-news-section">
          <div class="modal-section-label">Fréttir</div>
          <div class="modal-news" id="modal-news"></div>
        </div>
        <div class="modal-no-info" id="modal-no-info">
          <span class="no-info-icon">ℹ️</span>
          Nánari upplýsingar um þennan frambjóðanda eru ekki tiltækar ennþá.
        </div>
      </div>
    </div>
  </div>

  <!-- App -->
  <script type="module" src="js/municipality.js?v=19"></script>
  <script type="module" src="js/outreach.js?v=1"></script>
</body>
</html>
